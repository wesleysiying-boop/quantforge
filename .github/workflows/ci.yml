name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install "ruff>=0.7,<1.0"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install with dev extras
        run: python -m pip install -e ".[dev]"
      - run: mypy src

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install with dev extras
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest -q
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: .coverage

  rust-extension:
    name: Build & test Rust extension
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dev extras + maturin
        run: python -m pip install -e ".[dev]" maturin
      - name: Build Rust extension wheel
        run: |
          cd crates/quantforge-rust
          maturin build --release --interpreter "$(which python)"
      - name: Install Rust extension wheel
        run: python -m pip install --no-index --find-links crates/quantforge-rust/target/wheels quantforge-rust
      - name: Verify Rust path is enabled and tests pass
        run: |
          python -c "from quantforge.strategy import indicators; assert indicators.HAS_RUST, 'Rust extension not loaded'; print('HAS_RUST=True')"
          pytest -q
